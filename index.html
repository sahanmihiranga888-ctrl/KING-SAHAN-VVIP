<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING SHORT - Multi-Matrix Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e24;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            border: 1px solid #ff007f;
        }
        h2 {
            text-align: center;
            color: #ff007f;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 20px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .input-group {
            flex: 1;
            margin-bottom: 5px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ff007f;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .section-title {
            color: #bbb;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-left: 3px solid #ff007f;
            padding-left: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2a2a35;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            text-align: center;
        }
        input:focus {
            outline: none;
            border-color: #ff007f;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #ff007f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #e0006c;
        }
        /* Dashboard එක මුලින් හංගන්න */
        #app-dashboard {
            display: none;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #2a2a35;
            border-radius: 8px;
            text-align: center;
            border: 1px dashed #ff007f;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="login-screen" class="container">
        <h2>KING SHORT VIP LOGIN</h2>
        <div class="input-group">
            <label for="passwordField">ENTER VIP PASSWORD</label>
            <input type="password" id="passwordField" placeholder="••••••••">
        </div>
        <br>
        <button onclick="checkLogin()">LOGIN</button>
    </div>

    <!-- 2. MAIN APP DASHBOARD (ලොග් වුණාට පස්සේ පෙනෙන කොටස) -->
    <div id="app-dashboard" class="container">
        <h2>KING SHORT<br><span style="font-size: 13px; color: #fff;">Multi-Matrix Predictor</span></h2>
        
        <div class="section-title">Data Input Matrix</div>
        <div class="input-row">
            <div class="input-group">
                <label>LAST VALUE 1</label>
                <input type="number" id="val1" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>LAST VALUE 2</label>
                <input type="number" id="val2" placeholder="0.00">
            </div>
        </div>

        <button onclick="generatePrediction()">GENERATE SIGNAL</button>

        <div class="result-box" id="result">
            Awaiting Next Signal Matrix...
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // ඔයා ලබාගත්තු ඔයාගේම රහස් Gist ලින්ක් එක
        const gistUrl = "https://gist.githubusercontent.com/sahanmihiranga888-ctrl/4dfef0f3bcdfcb27475750e3261c2b2d/raw/1ea91c6f22182260fb3657e72b4e012aca5915fb/pw.txt";

        async function checkLogin() {
            const userEnteredPw = document.getElementById("passwordField").value.trim();
            
            if (userEnteredPw === "") {
                alert("කරුණාකර Password එකක් ඇතුළත් කරන්න!");
                return;
            }

            try {
                // Online Gist එක කියවීම
                const response = await fetch(gistUrl);
                const textData = await response.text();
                
                // පේළියෙන් පේළියට ඇති Password වෙන් කරගැනීම
                const validPasswords = textData.split("\n").map(pw => pw.trim());

                // ඇතුළත් කළ රහස් පදය Gist එකේ තිබේදැයි බැලීම
                if (validPasswords.includes(userEnteredPw)) {
                    alert("Login Successful! ✅");
                    // Login screen එක හංගලා Dashboard එක පෙන්වනවා
                    document.getElementById("login-screen").style.display = "none";
                    document.getElementById("app-dashboard").style.display = "block";
                } else {
                    alert("වැරදි VIP Password එකක්! කරුණාකර නිවැරදි එක ලබාගන්න.");
                }
            } catch (error) {
                alert("Internet Connection එකේ අවුලක්! නැවත උත්සාහ කරන්න.");
                console.error(error);
            }
        }

        // සිග්නල් ඇනලයිස් කරන සරල Logic එකක් (ඔයාට ඕන විදිහට මේක පස්සේ වෙනස් කරගන්න පුළුවන්)
        function generatePrediction() {
            const v1 = parseFloat(document.getElementById("val1").value);
            const v2 = parseFloat(document.getElementById("val2").value);

            if (isNaN(v1) || !v2) {
                alert("කරුණාකර අගයන් නිවැරදිව ඇතුළත් කරන්න!");
                return;
            }

            // නිකන් උදාහරණ ගණනය කිරීමක් දාලා තියෙන්නේ
            const prediction = ((v1 + v2) / 1.5).toFixed(2);
            
            document.getElementById("result").innerHTML = `🎯 NEXT SIGNAL: <span style="color: #ff007f;">${prediction}x</span>`;
        }
    </script>
</body>
</html>
