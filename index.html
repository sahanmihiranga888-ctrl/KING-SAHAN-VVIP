<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING SHORT - Multi-Matrix Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e24;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            border: 1px solid #ff007f;
        }
        h2 {
            text-align: center;
            color: #ff007f;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 20px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .input-group {
            flex: 1;
            margin-bottom: 5px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ff007f;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .section-title {
            color: #bbb;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-left: 3px solid #ff007f;
            padding-left: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2a2a35;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            text-align: center;
        }
        input:focus {
            border-color: #ff007f;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #ff007f;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }
        button:hover {
            background-color: #e0006c;
        }
        .error-msg {
            color: #ff3333;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
        .step-panel {
            display: none;
        }
        #stepPassword {
            display: block;
        }
        /* Loading Screen Style */
        .loader-box {
            text-align: center;
            padding: 30px 10px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #ff007f;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text {
            font-size: 18px;
            color: #00ff88;
            font-weight: bold;
            letter-spacing: 2px;
        }
        /* Result Screen Style */
        .result-box {
            padding: 20px;
            background-color: #2a2a35;
            border-radius: 8px;
            border: 1px solid #00ff88;
            margin-bottom: 25px;
        }
        .result-title {
            font-weight: bold;
            color: #00ff88;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .signal-time {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffffff;
            text-align: center;
            margin-bottom: 15px;
        }
        /* Target Odds Box */
        .target-box {
            border-top: 1px dashed #555;
            padding-top: 15px;
            color: #ffaa00;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<!-- STEP 1: PASSWORD SCREEN -->
<div class="container step-panel" id="stepPassword">
    <h2>VIP ACCESS LOCK</h2>
    <div style="margin-bottom: 20px;">
        <label for="pwInput">ENTER VIP PASSWORD</label>
        <input type="password" id="pwInput" placeholder="••••••••">
        <div class="error-msg" id="errorMsg">වැරදි මුරපදයක්! නැවත උත්සාහ කරන්න.</div>
    </div>
    <button onclick="checkPassword()">UNLOCK APP</button>
</div>

<!-- STEP 2: MULTI-INPUT SCREEN -->
<div class="container step-panel" id="stepMatrix">
    <h2>KING SHORT MATRIX v2.0</h2>
    
    <!-- 1. BEFORE HIGH ODDS -->
    <div class="section-title">1. Before High Odds</div>
    <div class="input-row">
        <div class="input-group">
            <label>TIME (HH:MM:SS)</label>
            <input type="text" id="beforeTime" placeholder="10:14:02">
        </div>
        <div class="input-group">
            <label>ODDS (e.g. 1.50)</label>
            <input type="text" id="beforeOdds" placeholder="1.84">
        </div>
    </div>

    <!-- 2. TARGET HIGH ODDS -->
    <div class="section-title" style="color: #ff007f;">2. Target High Odds 👑</div>
    <div class="input-row">
        <div class="input-group">
            <label style="color: #00ff88;">REAL TIME *</label>
            <input type="text" id="timeInput" placeholder="10:15:23" style="border-color: #ff007f;">
        </div>
        <div class="input-group">
            <label style="color: #00ff88;">REAL ODDS *</label>
            <input type="text" id="oddsInput" placeholder="32.40" style="border-color: #ff007f;">
        </div>
    </div>

    <!-- 3. AFTER HIGH ODDS -->
    <div class="section-title">3. After High Odds</div>
    <div class="input-row">
        <div class="input-group">
            <label>TIME (HH:MM:SS)</label>
            <input type="text" id="afterTime" placeholder="10:16:11">
        </div>
        <div class="input-group">
            <label>ODDS (e.g. 2.10)</label>
            <input type="text" id="afterOdds" placeholder="1.20">
        </div>
    </div>

    <button onclick="startLoadingProcess()">ANALYZE MATRIX 🎯</button>
</div>

<!-- STEP 3: 5-SECOND LOADING SCREEN -->
<div class="container step-panel" id="stepLoading">
    <div class="loader-box">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingStatus">CONNECTING TO SERVER...</div>
    </div>
</div>

<!-- STEP 4: RESULT SCREEN -->
<div class="container step-panel" id="stepResult">
    <h2>🎯 MATRIX RESULT</h2>
    <div class="result-box">
        <div class="result-title">⚡ GENERATED LUCKY MINUTES</div>
        <div class="signal-time" id="signalOutput">00:00 | 00:00</div>
        
        <!-- TARGET ODDS SECTION -->
        <div class="target-box">
            🎯 TARGET: 7x | 9x | 10x
        </div>
    </div>
    <button onclick="restartApp()">🔄 START AGAIN</button>
</div>

<script>
const ALLOWED_PASSWORDS = ["KING77", "VIP99", "SHORT01", "BONY7", "FUN26"]; 

function switchStep(nextStepId) {
    document.querySelectorAll('.step-panel').forEach(panel => {
        panel.style.display = 'none';
    });
    document.getElementById(nextStepId).style.display = 'block';
}

function checkPassword() {
    let enteredPw = document.getElementById('pwInput').value.trim();
    let errorMsg = document.getElementById('errorMsg');
    
    if(ALLOWED_PASSWORDS.includes(enteredPw)) {
        switchStep('stepMatrix');
    } else {
        errorMsg.style.display = 'block';
        document.getElementById('pwInput').value = '';
    }
}

function startLoadingProcess() {
    let timeStr = document.getElementById('timeInput').value.trim();
    let oddsStr = document.getElementById('oddsInput').value.trim();
    
    if(!timeStr || !timeStr.includes(':') || !oddsStr) {
        alert("කරුණාකර Target High Odds එකේ Time සහ Odds නිවැරදිව ඇතුළත් කරන්න!");
        return;
    }

    switchStep('stepLoading');
    
    let statusText = document.getElementById('loadingStatus');
    
    setTimeout(() => { statusText.innerHTML = "EXTRACTING DATA NODE..."; }, 1500);
    setTimeout(() => { statusText.innerHTML = "CALCULATING SIGNAL MATRIX..."; }, 3200);
    
    setTimeout(() => {
        processSignalCalculation();
    }, 5000);
}

function processSignalCalculation() {
    let timeStr = document.getElementById('timeInput').value.trim();
    let oddsStr = document.getElementById('oddsInput').value.trim();
    
    let timeParts = timeStr.split(':');
    let hours = parseInt(timeParts[0]);
    let minutes = parseInt(timeParts[1]);
    
    minutes = minutes + 1;
    if(minutes >= 60) { minutes = 0; hours = (hours + 1) % 24; }

    let cleanOdds = oddsStr.replace(/[^0-9]/g, ''); 
    let sumOfDigits = 0;
    for (let i = 0; i < cleanOdds.length; i++) {
        sumOfDigits += parseInt(cleanOdds[i]);
    }
    minutes = minutes + sumOfDigits;
    
    while (minutes >= 60) { minutes = minutes - 60; hours = (hours + 1) % 24; }

    let s1Hours = hours.toString().padStart(2, '0');
    let s1Minutes = minutes.toString().padStart(2, '0');
    let signal1 = `${s1Hours}:${s1Minutes}`;

    let nextMinutes = minutes + 1;
    let s2Hours = hours;
    if (nextMinutes >= 60) { nextMinutes = 0; s2Hours = (hours + 1) % 24; }
    s2Hours = s2Hours.toString().padStart(2, '0');
    nextMinutes = nextMinutes.toString().padStart(2, '0');
    let signal2 = `${s2Hours}:${nextMinutes}`;

    document.getElementById('signalOutput').innerHTML = `${signal1} &nbsp;|&nbsp; ${signal2}`;
    switchStep('stepResult');
}

function restartApp() {
    document.getElementById('beforeTime').value = '';
    document.getElementById('beforeOdds').value = '';
    document.getElementById('timeInput').value = '';
    document.getElementById('oddsInput').value = '';
    document.getElementById('afterTime').value = '';
    document.getElementById('afterOdds').value = '';
    switchStep('stepMatrix');
}
</script>

</body>
</html>
